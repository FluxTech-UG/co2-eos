# Run the validation suite + a wheel-contents sanity check on every push
# to main and every pull request. The wheel step protects against
# regressions to the package-data wiring that ships co2_eos/data/saturation_table.npz.

name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    name: pytest (py${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # macOS smoke test on the maintainer's dev platform.
          - os: macos-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with test extras
        run: pip install -e ".[test]"

      - name: Run pytest
        run: pytest tests/ -v

  wheel:
    # Build the wheel once on a single leg and assert that the saturation
    # table is included as package data. Without this, a fresh `pip install`
    # would silently break every saturation lookup and state inversion.
    name: build wheel + verify saturation table is packaged
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build
        run: pip install build

      - name: Build wheel
        run: python -m build --wheel

      - name: Verify co2_eos/data/saturation_table.npz is in the wheel
        run: |
          unzip -l dist/*.whl | tee /tmp/wheel_contents.txt
          grep -q "co2_eos/data/saturation_table.npz" /tmp/wheel_contents.txt

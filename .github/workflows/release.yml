# Publish to PyPI on tag push (v*) using PyPI Trusted Publishing (OIDC).
# No long-lived API tokens are stored in the repo.
#
# One-time setup on PyPI before the first tag push:
#   PyPI → Account settings → Publishing → Add a Pending Publisher
#     PyPI Project Name : co2-eos
#     Owner             : FluxTech-UG
#     Repository name   : co2-eos
#     Workflow name     : release.yml
#     Environment name  : pypi
#
# The workflow filename, environment name, and the publish job's name
# below MUST match what you configure on PyPI — changing any of them here
# requires updating the trusted-publisher entry on PyPI.

name: release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist + wheel
        run: python -m build

      - name: Verify the data tables are in the wheel
        run: |
          unzip -l dist/*.whl | tee /tmp/wheel_contents.txt
          # Both are runtime dependencies: the saturation table backs the
          # phase-aware inversions, and the seed table backs the fixed-iteration
          # (ρ, u) → T Newton (without it the inversion would not converge to the
          # round-trip tolerance in the configured iteration count).
          grep -q "co2_eos/data/saturation_table.npz" /tmp/wheel_contents.txt
          grep -q "co2_eos/data/seed_table.npz" /tmp/wheel_contents.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Trusted-publisher config on PyPI binds to this environment name.
    environment:
      name: pypi
      url: https://pypi.org/p/co2-eos
    permissions:
      # OIDC token for PyPI trusted publishing — no API token needed.
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
